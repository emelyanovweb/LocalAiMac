version: '3.8'

services:
  local_ai:
    build: .
    container_name: my_local_ai
    ports:
      - "8000:8000"
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./documents:/app/documents
      - ./uploads:/app/uploads
      - ./knowledge:/app/knowledge
    environment:
      - MODEL_PATH=/app/models/model.gguf
    restart: unless-stopped
